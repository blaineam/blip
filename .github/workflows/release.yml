name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build, Notarize & Release
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Generate Brand Assets
        run: swift Scripts/generate-assets.swift .build/assets

      - name: Import Signing Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build Release (Blip)
        run: |
          xcodebuild -scheme Blip -configuration Release \
            -derivedDataPath .build/DerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            -quiet

      - name: Build Release (BlipHelper)
        run: |
          xcodebuild -scheme BlipHelper -configuration Release \
            -derivedDataPath .build/DerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            -quiet

      - name: QA Checks
        run: |
          APP_PATH=".build/DerivedData/Build/Products/Release/Blip.app"

          echo "=== Binary Size Check ==="
          BINARY_SIZE=$(stat -f%z "$APP_PATH/Contents/MacOS/Blip")
          echo "Binary size: $BINARY_SIZE bytes"
          if [ "$BINARY_SIZE" -gt 5242880 ]; then
            echo "::error::Binary exceeds 5MB limit ($BINARY_SIZE bytes)"
            exit 1
          fi
          echo "✓ Binary is under 5MB"

          echo "=== Architecture Check ==="
          ARCHS=$(lipo -archs "$APP_PATH/Contents/MacOS/Blip")
          echo "Architectures: $ARCHS"
          if [[ "$ARCHS" != *"arm64"* ]]; then
            echo "::error::Binary missing arm64 architecture"
            exit 1
          fi
          echo "✓ arm64 architecture present"

          echo "=== Info.plist Validation ==="
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Contents/Info.plist")
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist")
          LS_UI=$(/usr/libexec/PlistBuddy -c "Print :LSUIElement" "$APP_PATH/Contents/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"
          echo "Version: $VERSION"
          echo "LSUIElement: $LS_UI"
          if [ "$LS_UI" != "true" ]; then
            echo "::error::LSUIElement must be true for menu bar app"
            exit 1
          fi
          echo "✓ Info.plist valid"

          echo "=== Hardened Runtime Check ==="
          codesign -dvv "$APP_PATH" 2>&1 | grep -q "flags=0x10000(runtime)" && echo "✓ Hardened runtime enabled" || echo "::warning::Hardened runtime flag not detected (expected in signed builds)"

          echo "=== Security Scan ==="
          # Check no secrets or API keys leaked into the binary
          if strings "$APP_PATH/Contents/MacOS/Blip" | grep -iE "(api_key|secret_key|password|token=)" > /dev/null 2>&1; then
            echo "::error::Potential secret found in binary"
            exit 1
          fi
          echo "✓ No secrets detected in binary"

          echo "=== Framework Dependencies ==="
          otool -L "$APP_PATH/Contents/MacOS/Blip" | grep -v "System\|usr/lib" | head -5
          echo "✓ QA checks passed"

      - name: Inject App Icon
        run: |
          APP_PATH=".build/DerivedData/Build/Products/Release/Blip.app"
          if [[ -f ".build/assets/Blip.icns" ]]; then
            echo "→ Injecting app icon..."
            mkdir -p "$APP_PATH/Contents/Resources"
            cp ".build/assets/Blip.icns" "$APP_PATH/Contents/Resources/AppIcon.icns"
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" "$APP_PATH/Contents/Info.plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" "$APP_PATH/Contents/Info.plist"
          fi

      - name: Re-sign After Icon Injection
        run: |
          APP_PATH=".build/DerivedData/Build/Products/Release/Blip.app"
          codesign --force --deep --sign "$IDENTITY" --timestamp --options runtime "$APP_PATH"

      - name: Package DMG
        run: |
          mkdir -p dist
          APP_PATH=".build/DerivedData/Build/Products/Release/Blip.app"
          DMG_TEMP=".build/blip-temp.dmg"
          DMG_FINAL="dist/Blip.dmg"
          VOLUME_NAME="Blip"

          # Create writable DMG
          hdiutil create -size 50m -fs HFS+ -volname "$VOLUME_NAME" -ov "$DMG_TEMP"

          # Mount it — capture device path for reliable detach
          BLIP_ATTACH_OUT=$(hdiutil attach "$DMG_TEMP" -readwrite -noverify -noautoopen)
          BLIP_DEV=$(echo "$BLIP_ATTACH_OUT" | head -1 | awk '{print $1}')
          BLIP_MOUNT="/Volumes/$VOLUME_NAME"

          # Copy app
          cp -R "$APP_PATH" "$BLIP_MOUNT/"

          # Create Applications alias
          ln -s /Applications "$BLIP_MOUNT/Applications"

          # Copy DMG background
          if [[ -f ".build/assets/dmg-background.jpg" ]]; then
            mkdir -p "$BLIP_MOUNT/.background"
            cp ".build/assets/dmg-background.jpg" "$BLIP_MOUNT/.background/background.jpg"
          fi

          # Style the DMG window via AppleScript
          osascript <<'APPLESCRIPT' || true
          tell application "Finder"
            tell disk "Blip"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {100, 100, 760, 500}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 100
              try
                set background picture of theViewOptions to file ".background:background.jpg"
              end try
              try
                set position of item "Blip.app" of container window to {145, 185}
              end try
              try
                set position of item "Applications" of container window to {515, 185}
              end try
              update without registering applications
              close
            end tell
          end tell
          APPLESCRIPT

          # Detach and convert to compressed DMG
          sync
          hdiutil detach "$BLIP_DEV" -force 2>/dev/null || true
          sleep 2
          hdiutil convert "$DMG_TEMP" -format UDZO -imagekey zlib-level=9 -o "$DMG_FINAL" -ov
          rm -f "$DMG_TEMP"

          # Sign DMG
          codesign --sign "$IDENTITY" --timestamp "$DMG_FINAL"

      - name: Inject BlipHelper App Icon
        run: |
          HELPER_APP=".build/DerivedData/Build/Products/Release/Blip Helper.app"
          if [[ -f ".build/assets/BlipHelper.icns" ]]; then
            mkdir -p "$HELPER_APP/Contents/Resources"
            cp ".build/assets/BlipHelper.icns" "$HELPER_APP/Contents/Resources/AppIcon.icns"
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" "$HELPER_APP/Contents/Info.plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" "$HELPER_APP/Contents/Info.plist"
          fi

      - name: Re-sign BlipHelper After Icon Injection
        run: |
          HELPER_APP=".build/DerivedData/Build/Products/Release/Blip Helper.app"
          codesign --force --deep --sign "$IDENTITY" --timestamp --options runtime "$HELPER_APP"

      - name: Package BlipHelper DMG
        run: |
          HELPER_APP=".build/DerivedData/Build/Products/Release/Blip Helper.app"
          HELPER_DMG_TEMP=".build/helper-temp.dmg"
          HELPER_DMG_FINAL="dist/BlipHelper.dmg"
          VOLUME_NAME="Blip Helper"

          hdiutil create -size 20m -fs HFS+ -volname "$VOLUME_NAME" -ov "$HELPER_DMG_TEMP"
          HELPER_ATTACH_OUT=$(hdiutil attach "$HELPER_DMG_TEMP" -readwrite -noverify -noautoopen)
          HELPER_DEV=$(echo "$HELPER_ATTACH_OUT" | head -1 | awk '{print $1}')
          HELPER_MOUNT="/Volumes/$VOLUME_NAME"

          cp -R "$HELPER_APP" "$HELPER_MOUNT/"
          ln -s /Applications "$HELPER_MOUNT/Applications"

          if [[ -f ".build/assets/dmg-background.jpg" ]]; then
            mkdir -p "$HELPER_MOUNT/.background"
            cp ".build/assets/dmg-background.jpg" "$HELPER_MOUNT/.background/background.jpg"
          fi

          osascript <<'APPLESCRIPT' || true
          tell application "Finder"
            tell disk "Blip Helper"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {100, 100, 760, 500}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 100
              try
                set background picture of theViewOptions to file ".background:background.jpg"
              end try
              try
                set position of item "Blip Helper.app" of container window to {145, 185}
              end try
              try
                set position of item "Applications" of container window to {515, 185}
              end try
              update without registering applications
              close
            end tell
          end tell
          APPLESCRIPT

          sync
          hdiutil detach "$HELPER_DEV" -force 2>/dev/null || true
          sleep 2
          hdiutil convert "$HELPER_DMG_TEMP" -format UDZO -imagekey zlib-level=9 -o "$HELPER_DMG_FINAL" -ov
          rm -f "$HELPER_DMG_TEMP"

          codesign --sign "$IDENTITY" --timestamp "$HELPER_DMG_FINAL"

      - name: Notarize DMGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Notarize Blip.dmg
          xcrun notarytool submit dist/Blip.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple dist/Blip.dmg

          # Notarize BlipHelper.dmg
          xcrun notarytool submit dist/BlipHelper.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple dist/BlipHelper.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/Blip.dmg
            dist/BlipHelper.dmg
          generate_release_notes: true
