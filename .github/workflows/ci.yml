name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build & QA
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build (Direct Distribution - Debug)
        run: |
          xcodebuild -scheme Blip -configuration Debug \
            -derivedDataPath .build/DerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build (App Store - Debug)
        run: |
          xcodebuild -scheme BlipAppStore -configuration Debug \
            -derivedDataPath .build/DerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build (Helper - Debug)
        run: |
          xcodebuild -scheme BlipHelper -configuration Debug \
            -derivedDataPath .build/DerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: QA Checks
        run: |
          APP=".build/DerivedData/Build/Products/Debug/Blip.app"

          echo "=== Binary Size ==="
          BINARY_SIZE=$(stat -f%z "$APP/Contents/MacOS/Blip")
          echo "Size: $BINARY_SIZE bytes ($(( BINARY_SIZE / 1024 )) KB)"
          if [ "$BINARY_SIZE" -gt 5242880 ]; then
            echo "::error::Binary exceeds 5MB limit"
            exit 1
          fi
          echo "✓ Under 5MB limit"

          echo "=== Architecture ==="
          ARCHS=$(lipo -archs "$APP/Contents/MacOS/Blip")
          echo "Architectures: $ARCHS"
          if [[ "$ARCHS" != *"arm64"* ]]; then
            echo "::error::Missing arm64"
            exit 1
          fi
          echo "✓ arm64 present"

          echo "=== Info.plist ==="
          LS_UI=$(/usr/libexec/PlistBuddy -c "Print :LSUIElement" "$APP/Contents/Info.plist")
          if [ "$LS_UI" != "true" ]; then
            echo "::error::LSUIElement must be true"
            exit 1
          fi
          echo "✓ LSUIElement = true"

          echo "=== Security Scan ==="
          if strings "$APP/Contents/MacOS/Blip" | grep -iE "(api_key|secret_key|password=|token=)" > /dev/null 2>&1; then
            echo "::error::Potential secret in binary"
            exit 1
          fi
          echo "✓ No secrets in binary"

          echo "=== Dependency Check ==="
          DEPS=$(otool -L "$APP/Contents/MacOS/Blip" | grep -cv "System\|usr/lib\|:")
          echo "Non-system dependencies: $DEPS"
          echo "✓ All QA checks passed"

      # ---- PR Pre-release: signed, notarized DMGs ----

      - name: Import Signing Certificate
        if: github.event_name == 'pull_request'
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build Release (Blip)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild -scheme Blip -configuration Release \
            -derivedDataPath .build/ReleaseDerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            -quiet

      - name: Build Release (BlipHelper)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild -scheme BlipHelper -configuration Release \
            -derivedDataPath .build/ReleaseDerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            -quiet

      - name: Generate Brand Assets
        if: github.event_name == 'pull_request'
        run: swift Scripts/generate-assets.swift .build/assets

      - name: Inject App Icons
        if: github.event_name == 'pull_request'
        run: |
          APP=".build/ReleaseDerivedData/Build/Products/Release/Blip.app"
          HELPER_APP=".build/ReleaseDerivedData/Build/Products/Release/Blip Helper.app"

          # Blip icon
          if [[ -f ".build/assets/Blip.icns" ]]; then
            mkdir -p "$APP/Contents/Resources"
            cp ".build/assets/Blip.icns" "$APP/Contents/Resources/AppIcon.icns"
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" "$APP/Contents/Info.plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" "$APP/Contents/Info.plist"
          fi

          # Helper icon
          if [[ -d "$HELPER_APP" && -f ".build/assets/BlipHelper.icns" ]]; then
            mkdir -p "$HELPER_APP/Contents/Resources"
            cp ".build/assets/BlipHelper.icns" "$HELPER_APP/Contents/Resources/AppIcon.icns"
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" "$HELPER_APP/Contents/Info.plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" "$HELPER_APP/Contents/Info.plist"
          fi

      - name: Re-sign After Icon Injection
        if: github.event_name == 'pull_request'
        run: |
          codesign --force --deep --sign "$IDENTITY" --timestamp --options runtime \
            ".build/ReleaseDerivedData/Build/Products/Release/Blip.app"

          HELPER_APP=".build/ReleaseDerivedData/Build/Products/Release/Blip Helper.app"
          if [ -d "$HELPER_APP" ]; then
            codesign --force --deep --sign "$IDENTITY" --timestamp --options runtime "$HELPER_APP"
          fi

      - name: Package Pre-release DMGs
        if: github.event_name == 'pull_request'
        run: |
          APP=".build/ReleaseDerivedData/Build/Products/Release/Blip.app"
          PR_NUM="${{ github.event.pull_request.number }}"

          mkdir -p dist

          # --- Blip.app DMG ---
          DMG_TEMP=".build/blip-pr-temp.dmg"
          DMG_FINAL="dist/Blip-PR${PR_NUM}.dmg"

          hdiutil create -size 50m -fs HFS+ -volname "Blip" -ov "$DMG_TEMP"
          BLIP_ATTACH_OUT=$(hdiutil attach "$DMG_TEMP" -readwrite -noverify -noautoopen)
          BLIP_DEV=$(echo "$BLIP_ATTACH_OUT" | head -1 | awk '{print $1}')
          BLIP_MOUNT="/Volumes/Blip"

          cp -R "$APP" "$BLIP_MOUNT/"
          ln -s /Applications "$BLIP_MOUNT/Applications"

          if [[ -f ".build/assets/dmg-background.jpg" ]]; then
            mkdir -p "$BLIP_MOUNT/.background"
            cp ".build/assets/dmg-background.jpg" "$BLIP_MOUNT/.background/background.jpg"
          fi

          osascript <<'APPLESCRIPT' || true
          tell application "Finder"
            tell disk "Blip"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {100, 100, 760, 500}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 100
              try
                set background picture of theViewOptions to file ".background:background.jpg"
              end try
              try
                set position of item "Blip.app" of container window to {145, 185}
              end try
              try
                set position of item "Applications" of container window to {515, 185}
              end try
              update without registering applications
              close
            end tell
          end tell
          APPLESCRIPT

          sync
          hdiutil detach "$BLIP_DEV" -force 2>/dev/null || true
          sleep 2
          hdiutil convert "$DMG_TEMP" -format UDZO -imagekey zlib-level=9 -o "$DMG_FINAL" -ov
          rm -f "$DMG_TEMP"
          codesign --sign "$IDENTITY" --timestamp "$DMG_FINAL"

          # --- Blip Helper.app DMG ---
          HELPER_APP=".build/ReleaseDerivedData/Build/Products/Release/Blip Helper.app"
          if [ -d "$HELPER_APP" ]; then
            HELPER_TEMP=".build/helper-pr-temp.dmg"
            HELPER_FINAL="dist/BlipHelper-PR${PR_NUM}.dmg"

            hdiutil create -size 20m -fs HFS+ -volname "Blip Helper" -ov "$HELPER_TEMP"
            HELPER_ATTACH_OUT=$(hdiutil attach "$HELPER_TEMP" -readwrite -noverify -noautoopen)
            HELPER_DEV=$(echo "$HELPER_ATTACH_OUT" | head -1 | awk '{print $1}')
            HELPER_MOUNT="/Volumes/Blip Helper"

            cp -R "$HELPER_APP" "$HELPER_MOUNT/"
            ln -s /Applications "$HELPER_MOUNT/Applications"

            if [[ -f ".build/assets/dmg-background.jpg" ]]; then
              mkdir -p "$HELPER_MOUNT/.background"
              cp ".build/assets/dmg-background.jpg" "$HELPER_MOUNT/.background/background.jpg"
            fi

            osascript <<'APPLESCRIPT' || true
          tell application "Finder"
            tell disk "Blip Helper"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {100, 100, 760, 500}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 100
              try
                set background picture of theViewOptions to file ".background:background.jpg"
              end try
              try
                set position of item "Blip Helper.app" of container window to {145, 185}
              end try
              try
                set position of item "Applications" of container window to {515, 185}
              end try
              update without registering applications
              close
            end tell
          end tell
          APPLESCRIPT

            sync
            hdiutil detach "$HELPER_DEV" -force 2>/dev/null || true
            sleep 2
            hdiutil convert "$HELPER_TEMP" -format UDZO -imagekey zlib-level=9 -o "$HELPER_FINAL" -ov
            rm -f "$HELPER_TEMP"
            codesign --sign "$IDENTITY" --timestamp "$HELPER_FINAL"
          fi

      - name: Notarize Pre-release DMGs
        if: github.event_name == 'pull_request'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"

          xcrun notarytool submit "dist/Blip-PR${PR_NUM}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "dist/Blip-PR${PR_NUM}.dmg"

          if [ -f "dist/BlipHelper-PR${PR_NUM}.dmg" ]; then
            xcrun notarytool submit "dist/BlipHelper-PR${PR_NUM}.dmg" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait
            xcrun stapler staple "dist/BlipHelper-PR${PR_NUM}.dmg"
          fi

      - name: Create Pre-release
        if: github.event_name == 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: pr-${{ github.event.pull_request.number }}
          name: "PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          body: |
            Automated pre-release build from PR #${{ github.event.pull_request.number }}.

            **Signed and notarized** — double-click to install, no Gatekeeper bypass needed.
          prerelease: true
          files: |
            dist/Blip-PR${{ github.event.pull_request.number }}.dmg
            dist/BlipHelper-PR${{ github.event.pull_request.number }}.dmg
